<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ucapan Ulang Tahun Spesial</title>
    <!-- Mengambil Font Romantis dari Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        /* --- CSS (Desain) --- */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Agar hati tidak keluar batas */
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* Bagian Kotak Hadiah */
        .gift-box {
            font-size: 100px;
            cursor: pointer;
            animation: bounce 2s infinite;
            transition: transform 0.3s;
        }

        .gift-box:hover {
            transform: scale(1.1);
        }

        .instruction {
            margin-top: 20px;
            color: #fff;
            font-size: 1.2rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        /* Bagian Surat (Awalnya Tersembunyi) */
        .letter-container {
            display: none; /* Tidak tampil dulu */
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 90%;
            animation: fadeIn 1.5s ease;
            position: relative;
        }

        .letter-container h1 {
            font-family: 'Pacifico', cursive;
            color: #ff4b6e;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .photo-frame {
            width: 200px;
            height: 200px;
            background-color: #eee;
            border-radius: 50%;
            margin: 20px auto;
            overflow: hidden;
            border: 5px solid #ffcdd2;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .message {
            color: #555;
            line-height: 1.6;
            font-size: 1.1rem;
        }

        /* Efks Animasi */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hati Jatuh */
        .heart {
            position: absolute;
            color: #ff4b6e;
            font-size: 20px;
            top: -20px;
            animation: fall linear infinite;
            z-index: 5;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }
        
        /* Audio Button (Opsional) */
        .music-btn {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: #ff4b6e;
            color: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <!-- Efek Hati Jatuh (Di-generate oleh JS) -->
    <div id="hearts-container"></div>

    <div class="container">
        <!-- Tampilan Awal: Kotak Hadiah -->
        <div id="gift-box" class="gift-box" onclick="openGift()">
            🎁
        </div>
        <div id="text-buka" class="instruction">
            Klik kadonya ya! 🎉
        </div>

        <!-- Tampilan Setelah Dibuka: Surat -->
        <div id="letter" class="letter-container">
            <h1>Happy Birthday!</h1>
            
            <!-- Ganti src="" dengan link foto pacar kamu -->
            <div class="photo-frame">
                <img src="https://via.placeholder.com/200" alt="Foto Kekasih">
            </div>

            <h2 style="color: #333;">Untuk: <span style="color:#ff4b6e;">[Nama Pacar]</span></h2>
            
            <p class="message">
                Selamat ulang tahun, sayangku! 🎂<br><br>
                Di hari special ini, aku ingin mengucapkan yang terbaik untukmu. 
                Terima kasih sudah menjadi motivasi dan warna hidupku. 
                Semangat selalu ya! Aku sayang kamu ❤️.
                <br><br>
                - Dari pacar kamu -
            </p>

            <button class="music-btn" onclick="playMusic()">Putar Musik 🎵</button>
        </div>
    </div>

    <!-- Elemen Audio (Ganti src dengan lagu kamu) -->
    <!-- Contoh lagu romantis: Adam Levine - She Will Be Loved (atau lagu kesukaan dia) -->
    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        /* --- JavaScript (Interaksi) --- */

        // 1. Fungsi untuk membuka hadiah
        function openGift() {
            const box = document.getElementById('gift-box');
            const text = document.getElementById('text-buka');
            const letter = document.getElementById('letter');

            box.style.display = 'none';
            text.style.display = 'none';
            letter.style.display = 'block';

            // Mainkan musik otomatis (有些浏览器可能会阻止自动播放, jadi tombol lebih aman)
            // playMusic(); 
        }

        // 2. Fungsi Memutar Musik
        function playMusic() {
            const audio = document.getElementById('bg-music');
            audio.volume = 0.5;
            audio.play();
            alert("Lagu sedang diputar! ❤️");
        }

        // 3. Efek Hati Jatuh
        function createHearts() {
            const heartContainer = document.getElementById('hearts-container');
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            
            // Posisi acak
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's'; // Durasi acak 3-5 detik
            
            heartContainer.appendChild(heart);

            // Hapus hati setelah animasi selesai agar browser tidak berat
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        // Membuat hati terus-menerus
        setInterval(createHearts, 500);

    </script>
</body>
</html>
